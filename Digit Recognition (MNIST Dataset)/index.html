<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNIST Digit Recognition</title>
  <meta name="description" content="Draw a digit and see it recognized in real-time using a simple neural network trained in the browser." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>

  <style>
    :root {
      --bg:        #0d1117;
      --card:      rgba(255,255,255,0.05);
      --border:    rgba(255,255,255,0.1);
      --cyan:      #4fd1c5;
      --purple:    #9f7aea;
      --green:     #68d391;
      --orange:    #f6ad55;
      --red:       #fc8181;
      --text:      #e2e8f0;
      --muted:     #718096;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 70% 50% at 15% 0%, rgba(102,126,234,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 100%, rgba(79,209,197,0.15) 0%, transparent 55%);
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    .badge {
      display: inline-block;
      background: rgba(79,209,197,0.12);
      border: 1px solid rgba(79,209,197,0.3);
      color: var(--cyan);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 5px 14px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
      background: linear-gradient(135deg, #e2e8f0 30%, #4fd1c5 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
    }

    /* ── Main Layout ── */
    .main-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      width: 100%;
      max-width: 820px;
    }
    @media (max-width: 640px) {
      .main-grid { grid-template-columns: 1fr; justify-items: center; }
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(12px);
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label::before {
      content: '';
      width: 3px; height: 12px;
      border-radius: 2px;
      background: linear-gradient(#4fd1c5, #63b3ed);
    }

    /* ── Status ── */
    #status-box {
      width: 100%;
      max-width: 820px;
      margin-bottom: 20px;
      background: rgba(79,209,197,0.06);
      border: 1px solid rgba(79,209,197,0.2);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    #status-dot.loading { background: var(--orange); animation: pulse 1s infinite; }
    #status-dot.ready   { background: var(--green); }
    #status-dot.error   { background: var(--red); }
    #status-msg { color: var(--text); }

    /* ── Train Button ── */
    #btn-train {
      width: 100%;
      max-width: 820px;
      margin-bottom: 20px;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(102,126,234,0.3);
    }
    #btn-train:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(102,126,234,0.5);
    }
    #btn-train:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      max-width: 820px;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 5px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4fd1c5, #63b3ed);
      border-radius: 5px;
      transition: width 0.3s ease;
    }

    /* ── Canvas ── */
    .draw-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #drawCanvas {
      background: #000;
      border-radius: 14px;
      border: 2px solid var(--border);
      cursor: crosshair;
      touch-action: none;
      display: block;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #drawCanvas:hover { border-color: rgba(79,209,197,0.4); }
    #drawCanvas.drawing { border-color: var(--cyan); box-shadow: 0 0 20px rgba(79,209,197,0.25); }

    /* Brush row */
    .brush-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .brush-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 700;
      transition: all 0.2s;
    }
    .brush-btn.active,
    .brush-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(79,209,197,0.1);
    }

    /* Clear button */
    #btn-clear {
      width: 220px;
      padding: 10px;
      background: rgba(252,129,129,0.1);
      border: 1px solid rgba(252,129,129,0.25);
      border-radius: 10px;
      color: var(--red);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-clear:hover { background: rgba(252,129,129,0.2); }

    /* ── Result Panel ── */
    .result-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Big digit display */
    .digit-display {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #big-digit {
      font-size: 6rem;
      font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, #4fd1c5, #63b3ed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      min-width: 90px;
      text-align: center;
      transition: all 0.3s;
    }
    #big-digit.pop {
      animation: pop 0.3s cubic-bezier(.36,1.56,.64,1);
    }

    .digit-info {}
    .digit-info-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    #conf-text {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--green);
    }
    #conf-bar-wrap {
      margin-top: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      height: 5px;
      width: 180px;
      overflow: hidden;
    }
    #conf-bar {
      height: 100%;
      background: linear-gradient(90deg, #4fd1c5, #68d391);
      border-radius: 6px;
      width: 0%;
      transition: width 0.4s cubic-bezier(.34,1.56,.64,1);
    }

    /* ── Probability Bars ── */
    .prob-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .prob-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .prob-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }
    .prob-track {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      height: 7px;
      overflow: hidden;
    }
    .prob-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #4fd1c5, #63b3ed);
      width: 0%;
      transition: width 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    .prob-fill.winner { background: linear-gradient(90deg, #f6ad55, #f687b3); }
    .prob-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Hint ── */
    .hint {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Animations ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<header>
  <div class="badge">✦ MNIST · TensorFlow.js</div>
  <h1>Digit Recognition</h1>
  <p class="subtitle">Train a tiny model in seconds, then draw any digit (0–9) to predict it.</p>
</header>

<!-- Status -->
<div id="status-box">
  <div id="status-dot"></div>
  <div id="status-msg">Click "Train Model" to get started.</div>
</div>

<!-- Train Button -->
<button id="btn-train" onclick="trainModel()">▶ Train Model</button>

<!-- Progress -->
<div class="progress-wrap"><div id="progress-bar"></div></div>

<!-- Main Grid -->
<div class="main-grid">

  <!-- Draw Column -->
  <div class="draw-col">
    <canvas id="drawCanvas" width="220" height="220"></canvas>

    <div class="brush-row">
      Brush:
      <button class="brush-btn"        id="b-s" onclick="setBrush(10)">S</button>
      <button class="brush-btn active" id="b-m" onclick="setBrush(14)">M</button>
      <button class="brush-btn"        id="b-l" onclick="setBrush(20)">L</button>
    </div>

    <button id="btn-clear" onclick="clearCanvas()">✕ Clear Canvas</button>

    <span class="hint">Draw a digit above.<br>Prediction is automatic.</span>
  </div>

  <!-- Result Column -->
  <div class="result-col card">

    <!-- Big digit -->
    <div class="digit-display">
      <div id="big-digit">?</div>
      <div class="digit-info">
        <div class="digit-info-label">Predicted Digit</div>
        <div id="conf-text" style="color:var(--muted);font-size:0.9rem">Train first →</div>
        <div id="conf-bar-wrap"><div id="conf-bar"></div></div>
      </div>
    </div>

    <!-- Probability bars -->
    <div class="card-label">Digit Probabilities</div>
    <div class="prob-list" id="prob-list">
      <!-- built by JS -->
    </div>

  </div>
</div>

<script src="mnist_data.js"></script>
<script>
"use strict";

// ── State ──────────────────────────────────────────────────
let model      = null;
let mnistData  = null;
let trained    = false;
let brushR     = 14;   // slightly thicker default for better stroke detection
let drawing    = false;

const EPOCHS     = 6;
const BATCH_SIZE = 128;
const STEPS      = 130;   // steps per epoch

// ── DOM ────────────────────────────────────────────────────
const canvas    = document.getElementById('drawCanvas');
const ctx       = canvas.getContext('2d');
const bigDigit  = document.getElementById('big-digit');
const confText  = document.getElementById('conf-text');
const confBar   = document.getElementById('conf-bar');
const dotEl     = document.getElementById('status-dot');
const msgEl     = document.getElementById('status-msg');
const progEl    = document.getElementById('progress-bar');
const probList  = document.getElementById('prob-list');

// Init canvas black
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, 220, 220);

// Build prob bars
buildProbBars();

// ── Status helpers ─────────────────────────────────────────
function setStatus(msg, mode='') {
  msgEl.textContent = msg;
  dotEl.className   = mode;
}

// ── Model (simple MLP) ────────────────────────────────────
function buildModel() {
  const m = tf.sequential();
  m.add(tf.layers.dense({ inputShape: [784], units: 256, activation: 'relu' }));
  m.add(tf.layers.dense({ units: 128, activation: 'relu' }));
  m.add(tf.layers.dense({ units: 64,  activation: 'relu' }));
  m.add(tf.layers.dense({ units: 10,  activation: 'softmax' }));
  m.compile({
    optimizer: tf.train.adam(0.001),
    loss:      'categoricalCrossentropy',
    metrics:   ['accuracy']
  });
  return m;
}

// ── Train ──────────────────────────────────────────────────
async function trainModel() {
  const btn = document.getElementById('btn-train');
  btn.disabled = true;
  trained = false;

  try {
    // Load data
    setStatus('Loading MNIST dataset…', 'loading');
    mnistData = new MnistData();
    await mnistData.load();
    setStatus('Dataset loaded. Building model…', 'loading');

    // Build
    if (model) model.dispose();
    model = buildModel();

    // Train
    const total = EPOCHS * STEPS;
    let done = 0;

    for (let ep = 0; ep < EPOCHS; ep++) {
      let totalAcc = 0;
      for (let s = 0; s < STEPS; s++) {
        const batch = mnistData.nextTrainBatch(BATCH_SIZE);
        const hist = await model.fit(
          batch.xs.reshape([BATCH_SIZE, 784]),
          batch.labels,
          { batchSize: BATCH_SIZE, epochs: 1, verbose: 0 }
        );
        totalAcc += hist.history.acc[0];
        batch.xs.dispose();
        batch.labels.dispose();
        done++;
        progEl.style.width = ((done / total) * 100).toFixed(1) + '%';
      }
      const acc = ((totalAcc / STEPS) * 100).toFixed(1);
      setStatus(`Epoch ${ep+1}/${EPOCHS} — accuracy: ${acc}%`, 'loading');
    }

    trained = true;
    progEl.style.width = '100%';
    setStatus('✅ Model trained! Draw a digit on the canvas.', 'ready');
    confText.textContent = 'Draw a digit →';
    confText.style.color = 'var(--muted)';
    confText.style.fontSize = '0.9rem';

  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
    console.error(err);
  }

  btn.disabled = false;
}

// ── Center & crop digit (key fix for 1, 7, 0, 9) ──────────
// Finds the bounding box of white pixels, crops it, and
// places it centered with padding — exactly like MNIST format.
function getCenteredPixels() {
  // Step 1: draw canvas → 28×28 temp
  const tmp = document.createElement('canvas');
  tmp.width = 28; tmp.height = 28;
  const tCtx = tmp.getContext('2d');
  tCtx.drawImage(canvas, 0, 0, 28, 28);
  const raw = tCtx.getImageData(0, 0, 28, 28).data;

  // Step 2: find bounding box of non-black pixels
  let minX = 28, maxX = -1, minY = 28, maxY = -1;
  for (let y = 0; y < 28; y++) {
    for (let x = 0; x < 28; x++) {
      const idx = (y * 28 + x) * 4;
      if (raw[idx] > 10) {   // pixel is bright
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  // If nothing drawn, return blank
  if (maxX < 0) return new Float32Array(784);

  // Step 3: crop the bounding box
  const cropW = maxX - minX + 1;
  const cropH = maxY - minY + 1;

  // Step 4: scale crop to fit inside 20×20 (leaving 4px padding each side)
  const scale  = 20 / Math.max(cropW, cropH);
  const dstW   = Math.round(cropW * scale);
  const dstH   = Math.round(cropH * scale);
  const offX   = Math.round((28 - dstW) / 2);
  const offY   = Math.round((28 - dstH) / 2);

  const centered = document.createElement('canvas');
  centered.width = 28; centered.height = 28;
  const cCtx = centered.getContext('2d');
  cCtx.fillStyle = '#000';
  cCtx.fillRect(0, 0, 28, 28);
  // Draw cropped section, scaled + centered
  cCtx.drawImage(tmp, minX, minY, cropW, cropH, offX, offY, dstW, dstH);

  const finalData = cCtx.getImageData(0, 0, 28, 28).data;
  const pixels = new Float32Array(784);
  for (let i = 0; i < 784; i++) {
    pixels[i] = finalData[i * 4] / 255;
  }
  return pixels;
}

// ── Predict ────────────────────────────────────────────────
function predict() {
  if (!trained || !model) return;

  const pixels = getCenteredPixels();
  const input  = tf.tensor2d(pixels, [1, 784]);
  const preds  = model.predict(input);

  preds.data().then(data => {
    input.dispose();
    preds.dispose();

    const digit = data.indexOf(Math.max(...data));
    const conf  = (Math.max(...data) * 100).toFixed(1);

    // Animate digit pop
    bigDigit.classList.remove('pop');
    void bigDigit.offsetWidth;
    bigDigit.textContent = digit;
    bigDigit.classList.add('pop');

    confText.textContent    = conf + '% confident';
    confText.style.color    = 'var(--green)';
    confText.style.fontSize = '1.3rem';
    confBar.style.width     = conf + '%';

    updateProbBars(Array.from(data));
  });
}

// ── Canvas Drawing ─────────────────────────────────────────
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.offsetX, y: e.offsetY };
}

function drawAt(e) {
  const p = getPos(e);
  const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, brushR);
  g.addColorStop(0,   'rgba(255,255,255,1)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.85)');
  g.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(p.x, p.y, brushR, 0, Math.PI * 2);
  ctx.fill();
}

canvas.addEventListener('mousedown', e => { drawing = true; drawAt(e); canvas.classList.add('drawing'); });
canvas.addEventListener('mousemove', e => { if (drawing) drawAt(e); });
canvas.addEventListener('mouseup',   () => { drawing = false; canvas.classList.remove('drawing'); predict(); });
canvas.addEventListener('mouseleave',() => { if (drawing) { drawing = false; canvas.classList.remove('drawing'); predict(); } });

canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; drawAt(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (drawing) drawAt(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); drawing = false; predict(); }, { passive: false });

function clearCanvas() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 220, 220);
  bigDigit.textContent = '?';
  confText.textContent = trained ? 'Draw a digit →' : 'Train first →';
  confText.style.color = 'var(--muted)';
  confText.style.fontSize = '0.9rem';
  confBar.style.width = '0%';
  resetProbBars();
}

// ── Brush ──────────────────────────────────────────────────
function setBrush(r) {
  brushR = r;
  ['b-s','b-m','b-l'].forEach(id => document.getElementById(id).classList.remove('active'));
  if (r === 10) document.getElementById('b-s').classList.add('active');
  else if (r === 14) document.getElementById('b-m').classList.add('active');
  else document.getElementById('b-l').classList.add('active');
}

// ── Probability Bars ───────────────────────────────────────
function buildProbBars() {
  probList.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    probList.innerHTML += `
      <div class="prob-row">
        <div class="prob-lbl">${i}</div>
        <div class="prob-track"><div class="prob-fill" id="pf-${i}"></div></div>
        <div class="prob-pct" id="pp-${i}">0%</div>
      </div>`;
  }
}

function updateProbBars(data) {
  const maxI = data.indexOf(Math.max(...data));
  for (let i = 0; i < 10; i++) {
    const pct = (data[i] * 100).toFixed(1);
    document.getElementById(`pf-${i}`).style.width = pct + '%';
    document.getElementById(`pp-${i}`).textContent = pct + '%';
    document.getElementById(`pf-${i}`).className = 'prob-fill' + (i === maxI ? ' winner' : '');
  }
}

function resetProbBars() {
  for (let i = 0; i < 10; i++) {
    document.getElementById(`pf-${i}`).style.width = '0%';
    document.getElementById(`pp-${i}`).textContent = '0%';
    document.getElementById(`pf-${i}`).className = 'prob-fill';
  }
}
</script>
</body>
</html>
