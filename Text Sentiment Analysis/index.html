<!DOCTYPE html>
<html>
<head>
    <title>Sentence Prediction Dashboard</title>
    <meta charset="UTF-8">
    
    <!-- Chart.js CDN (Lightweight) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
            padding: 40px;
        }

        textarea {
            width: 60%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        canvas {
            max-width: 500px;
            margin: 30px auto;
        }
    </style>
</head>

<body>

    <h2>📈 Dynamic Sentence Prediction</h2>

    <textarea id="inputText" placeholder="Enter sentence here..."></textarea>
    <br>
    <button onclick="predict()">Predict</button>

    <div class="result" id="predictionResult"></div>

    <canvas id="probChart"></canvas>

    <script src="script.js"></script>
</body>
</html>
