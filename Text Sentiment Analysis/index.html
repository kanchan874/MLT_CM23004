<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Sentiment Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
width:90%;
max-width:850px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
text-align:center;
}

h1{
color:#243b55;
margin-bottom:5px;
}

.roll{
font-size:14px;
color:#777;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:2px solid #243b55;
padding:15px;
font-size:16px;
resize:none;
outline:none;
}

button{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:25px;
font-size:22px;
font-weight:600;
}

.status{
margin-top:10px;
font-size:14px;
color:#666;
}

canvas{
margin-top:35px;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 AI Sentiment Intelligence</h1>
<div class="roll">Roll No : CM23004</div>

<p>Dataset Based Sentiment Analyzer</p>

<div class="status" id="status">Training model from dataset...</div>

<textarea id="inputText" placeholder="Type your sentence here..."></textarea>

<br>
<button onclick="predict()">Analyze Sentiment</button>

<div class="result" id="predictionResult"></div>

<canvas id="probChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
